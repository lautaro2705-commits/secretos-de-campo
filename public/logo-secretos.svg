<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <style>
    .red { fill: #C8102E; }
    .title { font: 800 64px/0.95 "Impact","Arial Black",sans-serif; fill: #C8102E; letter-spacing: -1px; }
    .sub   { font: 700 22px "Arial",sans-serif; fill: #C8102E; letter-spacing: 4px; }
  </style>

  <!-- BULL HEAD -->
  <g transform="translate(200 110)">
    <g class="red" stroke="#C8102E" stroke-width="2" stroke-linejoin="round">
      <!-- left horn -->
      <path d="M-90 -30 C -130 -60 -150 -30 -140 -10 C -120 -25 -100 -20 -75 -15 Z"/>
      <!-- right horn -->
      <path d="M 90 -30 C 130 -60 150 -30 140 -10 C 120 -25 100 -20 75 -15 Z"/>
      <!-- ears -->
      <ellipse cx="-70" cy="-5" rx="18" ry="10" transform="rotate(-25 -70 -5)"/>
      <ellipse cx="70"  cy="-5" rx="18" ry="10" transform="rotate( 25  70 -5)"/>
      <!-- face / head -->
      <path d="
        M -70 -5
        C -78 25 -70 65 -55 85
        C -45 100 -30 110 -20 112
        L -18 95
        C -10 102 10 102 18 95
        L 20 112
        C 30 110 45 100 55 85
        C 70 65 78 25 70 -5
        C 55 5 45 8 30 8
        C 20 8 10 4 0 4
        C -10 4 -20 8 -30 8
        C -45 8 -55 5 -70 -5 Z"/>
      <!-- inner detail (snout shading via white) -->
      <path fill="#fff" stroke="none" d="
        M -22 55
        C -18 75 -10 88 0 88
        C 10 88 18 75 22 55
        C 14 60 8 62 0 62
        C -8 62 -14 60 -22 55 Z"/>
      <!-- nostrils -->
      <ellipse cx="-8" cy="78" rx="3" ry="4"/>
      <ellipse cx=" 8" cy="78" rx="3" ry="4"/>
      <!-- eyes -->
      <ellipse cx="-35" cy="35" rx="5" ry="7"/>
      <ellipse cx=" 35" cy="35" rx="5" ry="7"/>
      <!-- forehead tuft lines -->
      <path fill="none" stroke="#C8102E" stroke-width="3" stroke-linecap="round"
            d="M -10 -2 L -6 18 M 0 -4 L 0 18 M 10 -2 L 6 18"/>
    </g>
  </g>

  <!-- TEXT -->
  <text x="200" y="285" text-anchor="middle" class="title">SECRETOS</text>
  <text x="200" y="345" text-anchor="middle" class="title">DE CAMPO</text>

  <!-- divider lines -->
  <line x1="60"  y1="372" x2="120" y2="372" stroke="#C8102E" stroke-width="2"/>
  <line x1="280" y1="372" x2="340" y2="372" stroke="#C8102E" stroke-width="2"/>

  <text x="200" y="380" text-anchor="middle" class="sub">ALMACEN DE CARNES</text>

  <!-- BANNER STRIPES -->
  <g class="red">
    <path d="M 60  410 h 22 v 80 l -11 -14 l -11 14 z"/>
    <path d="M 90  410 h 22 v 90 l -11 -14 l -11 14 z"/>
    <path d="M 120 410 h 22 v 95 l -11 -14 l -11 14 z"/>
    <path d="M 150 410 h 22 v 98 l -11 -14 l -11 14 z"/>
    <path d="M 180 410 h 40 v 100 l -20 -14 l -20 14 z"/>
    <path d="M 228 410 h 22 v 98 l -11 -14 l -11 14 z"/>
    <path d="M 258 410 h 22 v 95 l -11 -14 l -11 14 z"/>
    <path d="M 288 410 h 22 v 90 l -11 -14 l -11 14 z"/>
    <path d="M 318 410 h 22 v 80 l -11 -14 l -11 14 z"/>
  </g>
</svg>
